main_interval = 600          # 主循环间隔(秒)
notify = true                # 每次真实切换(节点/订阅/WiFi)弹 macOS 通知;--dry-run 不弹

[wifi]
enabled = true
check_interval = 3600        # WiFi 检查间隔(秒)
switch_cooldown = 7200       # WiFi 切换后冷却(秒)
bad_latency_ms = 200
bad_loss_pct = 5
min_improvement_ms = 100
interface = "en0"

[clash]
api = "http://127.0.0.1:9097"
secret = "your-clash-api-secret"
proxy_port = 7890
managed_group = "auto"       # 守护进程读取/切换的代理组。"auto" 每轮按 Clash 当前
                             # 模式自动判定:global→GLOBAL,direct→跳过,
                             # rule→从实时连接探测主入口组(探不到则回退 GLOBAL)。
                             # 填具体组名(如 "Proxy")可强制固定某个组。
delay_limit = 300            # 当前节点稳定阈值(ms)
max_switch_per_min = 3
max_profile_switch_per_30min = 1
profiles_yaml = "~/Library/Application Support/io.github.clash-verge-rev.clash-verge-rev/profiles.yaml"
trial = "试用"                # 命中此正则的节点(如试用)被忽略

# Region recognition is built in (countries + cities + flags). You normally only
# set your country preference order; everything is recognized out of the box.
priority = ["SG", "JP", "US"]

# Optional: enable city-level grouping + stickiness for specific countries.
# [clash.cities]
# JP = ["Tokyo", "Osaka"]
