name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build lean release tarball
        run: bash scripts/release-package.sh "$GITHUB_REF_NAME"

      - name: Attach assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release is normally created by the local /release flow; create it
          # here too if a bare tag was pushed, so the asset always gets attached.
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" \
            "dist/net-auto-switch-${GITHUB_REF_NAME}.tar.gz" \
            "dist/net-auto-switch-${GITHUB_REF_NAME}.tar.gz.sha256sum" \
            --clobber
