name: Dependabot auto-merge

# Enables auto-merge on every Dependabot PR. GitHub then merges it
# automatically once the required status checks (the `test` matrix,
# CodeQL, scan) pass. No action runs if those checks fail.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
