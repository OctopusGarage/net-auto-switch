name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening); the trailing
      # comment tracks the human-readable version Dependabot bumps.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy net_auto_switch

      - name: Shellcheck
        run: shellcheck --severity=warning scripts/*.sh scripts/pre-commit install.sh

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=net_auto_switch --cov-report=term-missing --cov-fail-under=60

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit --skip-editable
