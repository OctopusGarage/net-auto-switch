name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening); the trailing
      # comment tracks the human-readable version Dependabot bumps.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Encoding check (Path.write_text/read_text need explicit encoding)
        run: uv run python scripts/check_encoding.py $(git ls-files '*.py')

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy net_auto_switch

      - name: Shellcheck
        if: runner.os == 'Linux'
        run: shellcheck --severity=warning scripts/*.sh scripts/pre-commit install.sh

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=net_auto_switch --cov-report=term-missing --cov-fail-under=60

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit --skip-editable
